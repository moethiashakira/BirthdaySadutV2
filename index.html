<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flowers Bouquet</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  
  <div class="ui-container">
    <div id="builder-panel" class="panel">
      <h3>Build Your Bouquet</h3>
      <div class="button-group">
        <button class="btn-sunflower" onclick="addFlower('sunflower')">
          Add Sunflower (<span id="sunflower-count">0</span>)
        </button>
        <button class="btn-tulip" onclick="addFlower('tulip')">
          Add Tulip (<span id="tulip-count">0</span>)
        </button>
        <button class="btn-daisy" onclick="addFlower('daisy')">
          Add Daisy (<span id="daisy-count">0</span>)
        </button>
        <button class="btn-neon" onclick="addFlower('neon')">
          Add Rose (<span id="neon-count">0</span>)
        </button>
      </div>
      <button class="btn-finish" onclick="finishBouquet()">Finish Bouquet ✨</button>
    </div>

    <div id="result-panel" class="panel hidden">
      <h2 class="result-title">For You 🤍</h2>
      <p class="result-message">A beautiful arrangement, perfectly crafted.</p>
      <p class="result-summary" id="bouquet-summary"></p>
      <button class="btn-reset" onclick="location.reload()">Make Another</button>
    </div>
  </div>

  <div class="scene" id="main-scene">
    <div class="bouquet" id="bouquet">
      <div class="paper back"></div>
      <div id="flower-container"></div>
      <div class="paper front"></div>
      <div class="bow">
        <div class="ribbon-left"></div>
        <div class="ribbon-right"></div>
        <div class="bow-left"></div>
        <div class="bow-right"></div>
        <div class="bow-center"></div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
